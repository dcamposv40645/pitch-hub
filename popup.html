<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Pitch Hub</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header>
      <span class="logo-icon">♪</span>
      <h1>Pitch Hub</h1>
    </header>

    <div class="key-display">
      <div class="key-label">Detected Key</div>
      <div class="key-root" id="keyRoot">--</div>
      <div class="key-quality" id="keyQuality"></div>
      <div class="confidence" id="confidence"></div>
      <div class="chord-label">Chords</div>
      <div class="scale-notes" id="scaleNotes"></div>
    </div>

    <button class="btn" id="startBtn">Start Detection</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
